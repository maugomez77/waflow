services:
  - type: web
    name: waflow-api
    runtime: python
    plan: free
    buildCommand: pip install .
    startCommand: uvicorn waflow.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
